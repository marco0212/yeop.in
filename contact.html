<body>
  <nav class="navigator">
    <ul>
      <li>
        <a href="./index.html">Home</a>
      </li>
      <li>
        <a href="./about.html">About</a>
      </li>
      <li>
        <a href="./contact.html">Contact</a>
      </li>
    </ul>
  </nav>
  <section class="top contact">
    <h3>Contact</h3>
    <div class="profile-area">
      <div class="image-wrap">
        <img src="./images/me.png" alt="Me" />
      </div>
      <div class="social-wrap">
        <a href="https://github.com/marco0212" target="_blank">
          <i class="fa fa-github" aria-hidden="true"></i>
        </a>
        <a href="mailto:inyeop0212@gmail.com">
          <i class="fa fa-envelope-o" aria-hidden="true"></i>
        </a>
        
      </div>
      <p>Send me a message if you're interested.</p>
    </div>
    <form action="https://formspree.io/xvowzqna" method="POST">
      <p>
        <input type="text" name="name" placeholder="Name" required>
      </p>
      <p>
        <input type="email" name="replyto" placeholder="Email" required>
      </p>
      <p>
        <textarea name="message" placeholder="Message" rows="4" required></textarea>
      </p>
      <div class="button-wrap">
        <button type="submit">Submit</button>
      </div>
    </form>
  </section>
  <footer>
    <p>&copy; Copyright 2020 Jeong</p>
  </footer>
